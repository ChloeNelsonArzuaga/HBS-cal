<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HBS Fall 2026 Schedule Planner</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">HBS</div>
      <div>
        <h1>EC Schedule Planner</h1>
        <div class="sub">MBA Elective Curriculum — Fall 2026 (Q1Q2)</div>
      </div>
    </div>
    <div class="schedule-controls">
      <span class="schedule-label">Schedule</span>
      <select id="scheduleSelect" class="schedule-select"></select>
      <button class="btn" id="newScheduleBtn">+ New</button>
      <button class="btn" id="duplicateScheduleBtn">Duplicate</button>
      <button class="btn" id="renameScheduleBtn">Rename</button>
      <button class="btn danger" id="deleteScheduleBtn">Delete</button>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Enrolled</div>
        <div class="stat-value" id="enrolledCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Credits</div>
        <div class="stat-value" id="creditCount">0</div>
      </div>
      <button class="btn danger" id="clearBtn">Clear All</button>
    </div>
  </header>

  <main class="layout">
    <!-- Left: Course catalog -->
    <aside class="panel catalog">
      <div class="catalog-header">
        <div class="catalog-top-row">
          <input type="search" id="searchBox" placeholder="Search courses, instructors, codes…">
          <button class="btn add-custom-btn" id="addCustomBtn">+ Custom</button>
        </div>
        <div class="filter-row">
          <select id="filterTerm">
            <option value="">All terms</option>
            <option value="Q1Q2">Full term (Q1Q2)</option>
            <option value="Q1">Q1 only</option>
            <option value="Q2">Q2 only</option>
          </select>
          <select id="filterSchedule">
            <option value="">All schedules</option>
            <option value="X">X schedule</option>
            <option value="Y">Y schedule</option>
            <option value="Weekly">Weekly (Tue/Wed/Thu)</option>
            <option value="Joint">Joint-degree</option>
          </select>
          <select id="filterCategory">
            <option value="">All categories</option>
          </select>
        </div>
        <div class="filter-row">
          <label class="chk"><input type="checkbox" id="filterEnrolled"> Enrolled only</label>
          <label class="chk"><input type="checkbox" id="filterConflicts"> Hide conflicts</label>
        </div>
      </div>
      <div id="courseList" class="course-list"></div>
    </aside>

    <!-- Right: Calendar -->
    <section class="panel calendar">
      <div class="cal-header">
        <div class="nav-group">
          <button class="btn" id="prevWeek">‹</button>
          <button class="btn" id="todayBtn">This week</button>
          <button class="btn" id="nextWeek">›</button>
        </div>
        <div class="cal-title" id="weekLabel"></div>
        <div class="view-toggle">
          <button class="btn toggle active" data-view="week">Week</button>
          <button class="btn toggle" data-view="term">Full term</button>
        </div>
      </div>
      <div id="calendar" class="calendar-body"></div>
      <div class="cal-footer">
        <div class="legend">
          <span class="legend-dot x"></span> X day
          <span class="legend-dot y"></span> Y day
          <span class="legend-dot weekly"></span> Weekly
          <span class="legend-dot holiday"></span> Holiday / Exams
        </div>
        <button class="btn" id="exportIcsBtn">Export .ics</button>
      </div>
    </section>
  </main>

  <!-- Course detail drawer (fixed, shown from calendar blocks or catalog ⓘ buttons) -->
  <div id="courseDetail" class="course-detail hidden">
    <button class="detail-close" id="detailClose">✕</button>
    <div id="detailBody" class="detail-body"></div>
  </div>

  <nav class="mobile-tabs" id="mobileTabs">
    <button class="mobile-tab active" data-tab="catalog">Courses</button>
    <button class="mobile-tab" data-tab="calendar">Calendar</button>
  </nav>

  <div id="toast" class="toast"></div>

  <!-- Custom class modal -->
  <div id="customModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Custom Class</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <form id="customForm" autocomplete="off">
        <input type="hidden" id="editingId">

        <div class="form-field">
          <label for="customTitle">Class name <span class="req">*</span></label>
          <input type="text" id="customTitle" placeholder="e.g. Python for Finance" required>
        </div>

        <div class="form-field">
          <label for="customInstructor">Instructor</label>
          <input type="text" id="customInstructor" placeholder="e.g. Smith">
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="customStart">Start time <span class="req">*</span></label>
            <input type="time" id="customStart" required value="08:30">
          </div>
          <div class="form-field">
            <label for="customEnd">End time <span class="req">*</span></label>
            <input type="time" id="customEnd" required value="09:50">
          </div>
        </div>

        <div class="form-field">
          <label>Meeting days <span class="req">*</span></label>
          <div class="day-chips">
            <label class="day-chip"><input type="checkbox" name="days" value="X"> X days</label>
            <label class="day-chip"><input type="checkbox" name="days" value="Y"> Y days</label>
            <label class="day-chip"><input type="checkbox" name="days" value="MON"> Mon</label>
            <label class="day-chip"><input type="checkbox" name="days" value="TUE"> Tue</label>
            <label class="day-chip"><input type="checkbox" name="days" value="WED"> Wed</label>
            <label class="day-chip"><input type="checkbox" name="days" value="THU"> Thu</label>
            <label class="day-chip"><input type="checkbox" name="days" value="FRI"> Fri</label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="customTerm">Term</label>
            <select id="customTerm">
              <option value="Q1Q2">Q1Q2 (full term)</option>
              <option value="Q1">Q1 only</option>
              <option value="Q2">Q2 only</option>
            </select>
          </div>
          <div class="form-field">
            <label for="customCredits">Credits</label>
            <input type="number" id="customCredits" value="3" min="0" max="6" step="0.5">
          </div>
          <div class="form-field">
            <label for="customColor">Color</label>
            <input type="color" id="customColor" value="#7c3aed">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn" id="modalCancel">Cancel</button>
          <button type="button" class="btn danger hidden" id="deleteCustomBtn">Delete</button>
          <button type="submit" class="btn primary">Save Class</button>
        </div>
      </form>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
